name: CI

on:
  push:
  pull_request:

# One quality bar across all harnesses. Add a harness = add it to the matrix below; each entry
# runs that harness's own lint + unit tests + JSON validation inside its directory.
jobs:
  test:
    name: lint + unit tests (${{ matrix.harness }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - harness: security-harness
            python: "3.11"
          - harness: coding-harness
            python: "3.13"
    defaults:
      run:
        working-directory: ${{ matrix.harness }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Installed for every harness so a harness can adopt uv without a CI change.
      # Cache disabled: harnesses that don't invoke uv yet leave no cache dir to save,
      # which fails the post-job cache-save step.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
          enable-cache: false

      # Fail fast on malformed DAG / profile / benchmark JSON (the edits most likely to break a run).
      - name: Validate workflow & config JSON
        if: matrix.harness == 'security-harness'
        run: |
          jq -e . conductor/workflows/*.json conductor/taskdefs/*.json \
                  profiles/*.json bench/targets.json bench/expected/*.json > /dev/null
          echo "all JSON valid"

      - name: Validate coding-harness workflow JSON
        if: matrix.harness == 'coding-harness'
        run: make validate

      - name: Lint (ruff)
        if: matrix.harness == 'security-harness'
        run: make lint

      - name: Lint coding harness
        if: matrix.harness == 'coding-harness'
        run: make lint

      - name: Unit tests
        run: make test-ci

      # Serverless regression guard for the §19 hill-climbing write-back loop.
      - name: HC write-back selftest
        if: matrix.harness == 'security-harness'
        run: workers/.venv/bin/python bench/hc_writeback.py --selftest
